name: Tests

# Runs the Vitest unit suite (site components + newsletter lib/scripts).
#
# DISABLED: this repo is now a legacy mirror of https://jakubsobolewski.com.
# The blog and newsletter are authored in the canonical repo, so the suite no
# longer guards live code here. Auto-triggers removed; run manually via the
# Actions tab if you ever need it.
on:
  workflow_dispatch: {}

jobs:
  vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install pnpm first so setup-node can cache its store. Version is read
      # from the "packageManager" field in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test
