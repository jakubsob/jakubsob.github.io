name: Newsletter — enqueue on publish

# Queues a broadcast for the newest (or a chosen) post. The drain workflow
# then sends within the daily budget.
#
# DISABLED: newsletter automation moved to the canonical jakubsobolewski.com
# repo. The `workflow_run` auto-trigger is removed — critically, it used to
# fire on every "Deploy to GitHub Pages", which the 6-hourly feed mirror now
# triggers, so it would have enqueued spuriously. Manual dispatch only.
on:
  workflow_dispatch:
    inputs:
      slug:
        description: "Blog slug to enqueue (blank = newest post)"
        required: false
        type: string

jobs:
  enqueue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enqueue campaign
        working-directory: newsletter
        # Non-secret config (DATA_REPO, etc.) is read from worker/wrangler.toml;
        # only the data-repo token is a secret.
        env:
          GITHUB_TOKEN: ${{ secrets.NEWSLETTER_DATA_TOKEN }}
          CAMPAIGN_SLUG: ${{ github.event.inputs.slug }}
        run: node scripts/enqueue.js
