name: Newsletter — enqueue on publish

# Queues a broadcast for the newest (or a chosen) post. Triggered manually,
# or automatically a few minutes after a deploy so the live RSS feed has the
# post rendered. The drain workflow then sends within the daily budget.
on:
  workflow_dispatch:
    inputs:
      slug:
        description: "Blog slug to enqueue (blank = newest post)"
        required: false
        type: string
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [completed]

jobs:
  enqueue:
    runs-on: ubuntu-latest
    # On auto-trigger, only run for successful deploys of the main branch.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enqueue campaign
        working-directory: newsletter
        # Non-secret config (DATA_REPO, etc.) is read from worker/wrangler.toml;
        # only the data-repo token is a secret.
        env:
          GITHUB_TOKEN: ${{ secrets.NEWSLETTER_DATA_TOKEN }}
          CAMPAIGN_SLUG: ${{ github.event.inputs.slug }}
        run: node scripts/enqueue.js
