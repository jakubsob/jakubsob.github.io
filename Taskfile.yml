version: '3'

tasks:
  quarto:
    desc: Render a .qmd file to markdown, restoring frontmatter and removing the H1 heading
    preconditions:
      - sh: command -v fzf
        msg: "fzf is required: brew install fzf"
      - sh: command -v quarto
        msg: "quarto is required: brew install quarto"
    cmds:
      - |
        qmd="{{.CLI_ARGS}}"
        if [ -z "$qmd" ]; then
          qmd=$(find src/content/blog -name "*.qmd" | fzf)
          if [ -z "$qmd" ]; then
            exit 1
          fi
        fi

        dir=$(dirname "$qmd")
        base=$(basename "$qmd" .qmd)
        out="$dir/$base.md"

        # Render
        (cd "$dir" && PRIVATE_GITHUB_TOKEN=dummy quarto render "$(basename "$qmd")" --to gfm -M wrap:preserve)

        # Restore original frontmatter and strip injected H1
        python3 scripts/fix_md.py "$qmd"

  quarto:slug:
    desc: Render a single .qmd file to markdown using a slug, e.g. `quarto:build:slug -- test-doubles-taxonomy`
    preconditions:
      - sh: command -v fzf
        msg: "fzf is required: brew install fzf"
    cmds:
      - |
        slug="{{.CLI_ARGS}}"
        if [ -z "$slug" ]; then
          slug=$(find src/content/blog -name "*.qmd" -exec dirname {} \; | xargs -I{} basename {} | fzf)
          if [ -z "$slug" ]; then
            exit 1
          fi
        fi

        qmd=$(find src/content/blog -name "*.qmd" | grep "/$slug/index.qmd")
        if [ -z "$qmd" ]; then
          echo "No .qmd file found for slug '$slug'"
          exit 1
        fi

        task quarto -- "$qmd"

  quarto:watch:
    desc: Watch for changes in .qmd files and rebuild automatically
    preconditions:
      - sh: command -v entr
        msg: "entr is required: brew install entr"
    cmds:
      - find src/content/blog -name "*.qmd" | entr -p task quarto -- /_

  quarto:all:
    desc: Render all .qmd files in src/content/blog subdirectories
    cmds:
      - |
        find src/content/blog -name "*.qmd" | while read qmd; do
          task quarto -- "$qmd"
        done

  newsletter:enqueue:
    desc: 'Build a campaign from the live RSS feed and queue confirmed subscribers. Optional slug: task newsletter:enqueue -- my-post-slug (blank = newest post)'
    dotenv: ['newsletter/.env']
    preconditions:
      - sh: test -f newsletter/.env
        msg: "Create newsletter/.env first: cp newsletter/.env.example newsletter/.env"
    cmds:
      - CAMPAIGN_SLUG="{{.CLI_ARGS}}" node newsletter/scripts/enqueue.js

  newsletter:drain:
    desc: 'Send up to DAILY_BUDGET queued broadcast emails to confirmed subscribers (marks each sent immediately).'
    dotenv: ['newsletter/.env']
    preconditions:
      - sh: test -f newsletter/.env
        msg: "Create newsletter/.env first: cp newsletter/.env.example newsletter/.env"
    cmds:
      - node newsletter/scripts/drain.js

  newsletter:test:
    desc: 'Test a broadcast without publishing: enqueue then drain. Optional slug: task newsletter:test -- my-post-slug. Sends to all CONFIRMED subscribers — run while only test addresses are confirmed.'
    cmds:
      - task newsletter:enqueue -- "{{.CLI_ARGS}}"
      - task newsletter:drain

  newsletter:worker:secrets:
    desc: 'Set required Cloudflare Worker secrets for newsletter (interactive prompts for GITHUB_TOKEN and BREVO_API_KEY).'
    preconditions:
      - sh: command -v npx
        msg: "npx is required (install Node.js first)."
    cmds:
      - cd newsletter/worker && npx wrangler secret put GITHUB_TOKEN
      - cd newsletter/worker && npx wrangler secret put BREVO_API_KEY

  newsletter:worker:deploy:
    desc: 'Redeploy the newsletter Cloudflare Worker using wrangler.toml settings.'
    preconditions:
      - sh: command -v npx
        msg: "npx is required (install Node.js first)."
    cmds:
      - cd newsletter/worker && npx wrangler deploy

  newsletter:worker:dev:
    desc: 'Run the newsletter Worker locally on http://localhost:8787. Reads secrets from newsletter/worker/.dev.vars; with TURNSTILE_SECRET unset it skips bot verification.'
    preconditions:
      - sh: command -v npx
        msg: "npx is required (install Node.js first)."
      - sh: test -f newsletter/worker/.dev.vars
        msg: "Create newsletter/worker/.dev.vars first: cp newsletter/worker/.dev.vars.example newsletter/worker/.dev.vars"
    cmds:
      - cd newsletter/worker && npx wrangler dev
